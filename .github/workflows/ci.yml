name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-check:
    name: Test and Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Run Cloudflare-compatible checks
        run: npm run check:cf

      - name: Start local server
        run: nohup npm start > /tmp/cht-number-picker.log 2>&1 &

      - name: Wait for health endpoint
        run: |
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:5173/api/health >/tmp/cht-health.json; then
              cat /tmp/cht-health.json
              exit 0
            fi
            sleep 1
          done
          cat /tmp/cht-number-picker.log
          exit 1
